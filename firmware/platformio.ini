; AgentLamp firmware — Waveshare ESP32-S3-LCD-1.47B
; Board: ESP32-S3R8, 8MB OPI PSRAM, 16MB flash, ST7789 172x320 SPI LCD, onboard RGB LED.
; Contract: docs/firmware/firmware_contract.md  |  Pins: docs/BUILD.md (Wiring/Pins)
;
; This is a SCAFFOLD platformio.ini: it pins the toolchain + board so the Firmware
; phase can `pio run` immediately. Real LCD/LED/network modules land in that phase.

[platformio]
src_dir = src
default_envs = waveshare-s3-lcd-147
; Host-specific serial port overrides live in a gitignored, per-machine file so no
; one developer's /dev/cu.usbmodem* (or COMx on Windows) ever compiles into the
; shared/relay build (I3 — relay builds must be host-independent). PlatformIO loads
; this if present and silently skips it if absent. Example platformio.local.ini:
;     [env:waveshare-s3-lcd-147]
;     upload_port  = /dev/cu.usbmodem1101
;     monitor_port = /dev/cu.usbmodem1101
extra_configs = platformio.local.ini

[env:waveshare-s3-lcd-147]
; Pinned for reproducible release builds (resolved versions from devlog 03):
; espressif32@7.0.1 -> Arduino-ESP32 core 2.0.17. Bump deliberately, not by drift.
platform = espressif32@7.0.1
; Use the generic ESP32-S3-DevKitC-1 base and override flash/PSRAM below — the
; Waveshare module is electrically an ESP32-S3R8 (OPI PSRAM + 16MB flash).
board = esp32-s3-devkitc-1
framework = arduino
; Real firmware is main.cpp; exclude the bring-up diagnostic (src/diag.cpp has its own setup/loop)
build_src_filter = +<*> -<diag.cpp>

; --- Native USB (ESP32-S3): CDC on boot so Serial works over /dev/cu.usbmodem* ---
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    ; LCD geometry (ST7789 172x320) — see docs/ui/display_spec.md
    -D LCD_WIDTH=172
    -D LCD_HEIGHT=320
    ; Pin map (docs/BUILD.md Wiring/Pins) — verify against Waveshare wiki for revision
    -D PIN_LCD_MOSI=45
    -D PIN_LCD_SCLK=40
    -D PIN_LCD_CS=42
    -D PIN_LCD_DC=41
    -D PIN_LCD_RST=39
    ; Backlight is GPIO46 on this -1.47B board — EMPIRICALLY CONFIRMED by a pin sweep on
    ; the real hardware 2026-05-30. The espp/non-B docs (and an earlier review) say 48,
    ; but driving 48 leaves the screen DARK; driving 46 lights it. The B variant uses 46.
    -D PIN_LCD_BL=46
    -D PIN_RGB_LED=38
    -D FIRMWARE_VERSION='"v0.1"'

; --- Memory: 8MB OPI PSRAM + 16MB flash ---
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

; --- Serial / monitor / upload ---
; Host-independent: baud rates only. The serial port (/dev/cu.usbmodem* on macOS,
; /dev/ttyUSB*|ttyACM* on Linux, COMx on Windows) is NOT pinned here — PlatformIO
; auto-detects it, or set it per-machine in the gitignored platformio.local.ini
; (see [platformio] extra_configs above). Keeping it out of the shared/relay env
; means a relay build compiles identically on any developer's box (I3).
monitor_speed = 115200
upload_speed = 921600

; --- Libraries ---
; Pinned to exact resolved versions (devlog 03) for reproducible release builds —
; no caret ranges, so a fresh checkout months later links the same library code.
lib_deps =
    bblanchon/ArduinoJson @ 7.4.3
    lovyan03/LovyanGFX @ 1.2.21
    adafruit/Adafruit NeoPixel @ 1.15.5

; --- Relay mode: HTTPS transport to a fixed cloud relay URL ---
; Same firmware as the local-mode default env, but RELAY_MODE=1 selects the verified-TLS
; transport (src/relay.h: WiFiClientSecure + pinned root CA bundle + NTP-before-handshake) and
; COMPILES OUT the single-machine LAN literals from config.h (I3 — the static_asserts there fail
; the build if 192.168.1.148 / yangzhenzhous-macbook-air ever reappear in a relay image).
;
; The relay URL + device token + WiFi networks all come from NVS provisioning (captive portal),
; NOT from source. The relay device token is installed on the relay via `wrangler secret put
; AGENTLAMP_DEVICE_TOKENS` or `POST /admin/devices/{id}/enroll` (see docs/cloud/deploy.md), then
; pasted into the portal — there is no `agentlamp device pair` CLI.
;
; CA TRUST: a stock `pio run -e relay` WORKS OUT OF THE BOX. The pinned roots are already
; committed (src/ca/*.pem.inc, SHA-256-verified) and ca_bundle.h defaults CA_BUNDLE_POPULATED=1
; for a RELAY_MODE build, so the relay image links the committed trust anchor and a fresh
; device verifies the Cloudflare-fronted relay immediately — no separate fetch step required.
; To refresh/re-verify the roots (CA rotation, or CI), run once (needs network):
;     firmware/scripts/fetch_ca_bundle.sh          # re-downloads + SHA-256-verifies the roots
;     firmware/scripts/fetch_ca_bundle.sh --check   # verifies the committed .pem.inc (no network egress beyond the published roots)
; Fail-closed is preserved at RUNTIME: if the bundle were ever genuinely absent/corrupt,
; pemLooksValid() rejects it and the handshake is REFUSED (Diagnostics), never insecure — an
; empty/broken bundle can NEVER downgrade to plaintext-trust.
[env:relay]
extends = env:waveshare-s3-lcd-147
build_flags =
    ${env:waveshare-s3-lcd-147.build_flags}
    -D RELAY_MODE=1

; Explicit "prove the empty-bundle fail-closed path" env: forces CA_BUNDLE_POPULATED=0 even in
; a relay build, so the committed roots are NOT linked. The image compiles but every handshake
; fails closed (RELAY_ERR_NO_CA -> Diagnostics) until /cacerts provisions a bundle into NVS.
; Used to regression-test the fail-closed branch; NOT a shippable image.
[env:relay-no-ca]
extends = env:relay
build_flags =
    ${env:relay.build_flags}
    -D CA_BUNDLE_POPULATED=0

; --- Hardware bring-up diagnostic: compiles ONLY src/diag.cpp (not main.cpp) ---
[env:diag]
extends = env:waveshare-s3-lcd-147
build_src_filter = -<*> +<diag.cpp>
