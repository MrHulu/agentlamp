; AgentLamp firmware — Waveshare ESP32-S3-LCD-1.47B
; Board: ESP32-S3R8, 8MB OPI PSRAM, 16MB flash, ST7789 172x320 SPI LCD, onboard RGB LED.
; Contract: docs/firmware/firmware_contract.md  |  Pins: docs/BUILD.md (Wiring/Pins)
;
; This is a SCAFFOLD platformio.ini: it pins the toolchain + board so the Firmware
; phase can `pio run` immediately. Real LCD/LED/network modules land in that phase.

[platformio]
src_dir = src
default_envs = waveshare-s3-lcd-147

[env:waveshare-s3-lcd-147]
; Pinned for reproducible release builds (resolved versions from devlog 03):
; espressif32@7.0.1 -> Arduino-ESP32 core 2.0.17. Bump deliberately, not by drift.
platform = espressif32@7.0.1
; Use the generic ESP32-S3-DevKitC-1 base and override flash/PSRAM below — the
; Waveshare module is electrically an ESP32-S3R8 (OPI PSRAM + 16MB flash).
board = esp32-s3-devkitc-1
framework = arduino
; Real firmware is main.cpp; exclude the bring-up diagnostic (src/diag.cpp has its own setup/loop)
build_src_filter = +<*> -<diag.cpp>

; --- Native USB (ESP32-S3): CDC on boot so Serial works over /dev/cu.usbmodem* ---
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    ; LCD geometry (ST7789 172x320) — see docs/ui/display_spec.md
    -D LCD_WIDTH=172
    -D LCD_HEIGHT=320
    ; Pin map (docs/BUILD.md Wiring/Pins) — verify against Waveshare wiki for revision
    -D PIN_LCD_MOSI=45
    -D PIN_LCD_SCLK=40
    -D PIN_LCD_CS=42
    -D PIN_LCD_DC=41
    -D PIN_LCD_RST=39
    ; Backlight is GPIO46 on this -1.47B board — EMPIRICALLY CONFIRMED by a pin sweep on
    ; the real hardware 2026-05-30. The espp/non-B docs (and an earlier review) say 48,
    ; but driving 48 leaves the screen DARK; driving 46 lights it. The B variant uses 46.
    -D PIN_LCD_BL=46
    -D PIN_RGB_LED=38
    -D FIRMWARE_VERSION='"v0.1"'

; --- Memory: 8MB OPI PSRAM + 16MB flash ---
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

; --- Serial / monitor / upload ---
monitor_speed = 115200
upload_speed = 921600
; Native USB CDC port for this board on this host (devlog 01).
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101

; --- Libraries ---
; Pinned to exact resolved versions (devlog 03) for reproducible release builds —
; no caret ranges, so a fresh checkout months later links the same library code.
lib_deps =
    bblanchon/ArduinoJson @ 7.4.3
    lovyan03/LovyanGFX @ 1.2.21
    adafruit/Adafruit NeoPixel @ 1.15.5

; --- Hardware bring-up diagnostic: compiles ONLY src/diag.cpp (not main.cpp) ---
[env:diag]
extends = env:waveshare-s3-lcd-147
build_src_filter = -<*> +<diag.cpp>
